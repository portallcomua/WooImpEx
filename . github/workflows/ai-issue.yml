name: AI Issue Worker

'on':
  issues:
    types: [opened, edited]
  issue_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      command:
        description: "audit, setup, release"
        required: true
        default: "audit"
      release_version:
        description: "Release version"
        required: false
        default: "1.0.0"

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  ai-worker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Run AI worker
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EVENT_NAME: ${{ github.event_name }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          MANUAL_COMMAND: ${{ github.event.inputs.command }}
          RELEASE_VERSION: ${{ github.event.inputs.release_version }}
        run: |
          python3 scripts/ai_worker.py

      - name: Commit changes
        run: |
          git add -A
          git commit -m "chore: run AI issue worker" || echo "No changes"
          git push || echo "Nothing to push" 
